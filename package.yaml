name: myblog 
version: 0.1.0.0
homepage:            https://github.com/githubuser/myblog#readme
license:             BSD3
license-file:        LICENSE
author:              Author name here
maintainer:          example@example.com
copyright:           2021 Author name here
category:            Web
build-type:          Simple
extra-source-files:  README.md


library:
  source-dirs: src
  dependencies:
  - base >= 4.7 && < 5
  - hakyll
  - pandoc    >= 2.11  && < 2.14
  - zeromq4-haskell
  - aeson
  - bytestring
  - pandoc-types
  - text

executable:
  main: site.hs 
  ghc-options:
  - -threaded
  dependencies:
  - base >= 4.7 && < 5
  - hakyll
  - pandoc    >= 2.11  && < 2.14
  - zeromq4-haskell
  - aeson
  - bytestring
  - pandoc-types
  - text
  - myblog